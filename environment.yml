# Park Smart UK — Anaconda Environment
# Create:  conda env create -f environment.yml
# Activate: conda activate parksmart
# Update:   conda env update -f environment.yml --prune

name: parksmart

channels:
  - defaults
  - conda-forge

dependencies:
  # ── Python ───────────────────────────────────────────────────────────────────
  - python=3.11

  # ── Web Framework ────────────────────────────────────────────────────────────
  - pip

  # ── Computer Vision (conda-forge builds include CUDA support) ────────────────
  - conda-forge::opencv=4.10.0

  # ── Scientific / ML ──────────────────────────────────────────────────────────
  - numpy=1.26.4
  - conda-forge::scikit-learn=1.5.1
  - conda-forge::joblib=1.4.2

  # ── pip-only packages (not on conda) ─────────────────────────────────────────
  - pip:
      - Flask==3.0.3
      - Werkzeug==3.0.3
      - pytesseract==0.3.13
      - Pillow==10.4.0
      - tensorflow==2.17.0
      - python-dotenv==1.0.1
      - gunicorn==22.0.0
      - pytest==8.3.2
      - pytest-flask==1.3.0

# ── System dependencies (install separately) ──────────────────────────────────
# Tesseract OCR engine (required by pytesseract):
#   Ubuntu/Debian:  sudo apt install tesseract-ocr
#   macOS:          brew install tesseract
#   Windows:        https://github.com/UB-Mannheim/tesseract/wiki
#
# VS Code extensions recommended:
#   - Python (ms-python.python)
#   - Pylance
#   - GitLens
#   - Thunder Client (API testing)
